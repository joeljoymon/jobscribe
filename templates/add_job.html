{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Add New Application</h1>

<div class="card" style="max-width:700px;">
    <form id="addJobForm">
        <div class="form-group">
            <label>Company Name *</label>
            <input type="text" id="company" placeholder="e.g. Google" required>
        </div>
        <div class="form-group">
            <label>Role *</label>
            <input type="text" id="role" placeholder="e.g. Backend Intern" required>
        </div>
        <div class="form-group">
            <label>Job Posting URL</label>
            <input type="url" id="job_url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Job Description</label>
            <textarea id="jd_text"
                placeholder="Paste the full job description here..."></textarea>
            <small style="color:#888;">
                Adding the JD now lets you run AI analysis immediately after saving.
            </small>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <input type="text" id="notes"
                placeholder="e.g. Applied via LinkedIn, referral from...">
        </div>

        <div style="display:flex; gap:0.8rem;">
            <button type="button" class="btn btn-primary" onclick="submitJob()">
                Save Application
            </button>
            <a href="/" class="btn" style="background:#f0f0f0; color:#444;">
                Cancel
            </a>
        </div>

        <div id="formMsg" style="margin-top:1rem; font-size:0.9rem;"></div>
    </form>
</div>

<script>
async function submitJob() {
    const company  = document.getElementById('company').value.trim();
    const role     = document.getElementById('role').value.trim();
    const job_url  = document.getElementById('job_url').value.trim();
    const jd_text  = document.getElementById('jd_text').value.trim();
    const notes    = document.getElementById('notes').value.trim();
    const msg      = document.getElementById('formMsg');

    if (!company || !role) {
        msg.style.color = '#991b1b';
        msg.textContent = 'Company and role are required.';
        return;
    }

    // Build form data — avoids JSON escaping issues with long JD text
    const formData = new FormData();
    formData.append('company', company);
    formData.append('role', role);
    if (job_url) formData.append('job_url', job_url);
    if (jd_text) formData.append('jd_text', jd_text);
    if (notes)   formData.append('notes', notes);

    const res = await fetch('/jobs/', {
        method: 'POST',
        body: formData
    });

    if (res.ok) {
        const job = await res.json();
        msg.style.color = '#065f46';
        msg.textContent = 'Saved! Redirecting...';
        setTimeout(() => window.location.href = `/jobs/${job.id}/detail`, 1000);
    } else {
        const data = await res.json();
        msg.style.color = '#991b1b';
        msg.textContent = 'Error: ' + (data.detail || 'Something went wrong');
    }
}
</script>

{% endblock %}
