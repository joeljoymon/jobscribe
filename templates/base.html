<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobScribe</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont,
                         'Segoe UI', sans-serif;
            background: #0f0c1a;
            color: rgba(255,255,255,0.88);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Navigation ── */
        nav {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(167,139,250,0.15);
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a78bfa;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .brand span { color: rgba(167,139,250,0.45); }

        nav a {
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        nav a:hover { color: #a78bfa; }

        /* ── Layout ── */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: rgba(255,255,255,0.9);
        }

        /* ── Glass card ── */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(167,139,250,0.15);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(10px);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.2s;
        }

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }

        .btn-primary {
            background: rgba(167,139,250,0.2);
            color: #a78bfa;
            border: 1px solid rgba(167,139,250,0.4);
        }

        .btn-primary:hover {
            background: rgba(167,139,250,0.3);
        }

        .btn-success {
            background: rgba(52,211,153,0.15);
            color: #34d399;
            border: 1px solid rgba(52,211,153,0.3);
        }

        .btn-danger {
            background: rgba(248,113,113,0.15);
            color: #f87171;
            border: 1px solid rgba(248,113,113,0.3);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ── Status badges ── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-interested  { background:rgba(96,165,250,0.15);  color:#60a5fa;  border:1px solid rgba(96,165,250,0.3);  }
        .badge-researched  { background:rgba(167,139,250,0.15); color:#a78bfa;  border:1px solid rgba(167,139,250,0.3); }
        .badge-assessed    { background:rgba(251,191,36,0.15);  color:#fbbf24;  border:1px solid rgba(251,191,36,0.3);  }
        .badge-preparing   { background:rgba(251,191,36,0.15);  color:#fbbf24;  border:1px solid rgba(251,191,36,0.3);  }
        .badge-ready       { background:rgba(52,211,153,0.15);  color:#34d399;  border:1px solid rgba(52,211,153,0.3);  }
        .badge-applied     { background:rgba(52,211,153,0.15);  color:#34d399;  border:1px solid rgba(52,211,153,0.3);  }
        .badge-interview   { background:rgba(167,139,250,0.2);  color:#c4b5fd;  border:1px solid rgba(167,139,250,0.4); }
        .badge-offer       { background:rgba(52,211,153,0.2);   color:#6ee7b7;  border:1px solid rgba(52,211,153,0.4);  }
        .badge-rejected    { background:rgba(248,113,113,0.15); color:#f87171;  border:1px solid rgba(248,113,113,0.3); }
        .badge-ghosted     { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.1); }
        .badge-withdrawn   { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.1); }

        /* ── Skill tags ── */
        .tag {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            font-size: 0.78rem;
            margin: 0.2rem;
        }

        .tag-green { background:rgba(52,211,153,0.12);  color:#34d399;  border:1px solid rgba(52,211,153,0.25);  }
        .tag-red   { background:rgba(248,113,113,0.12); color:#f87171;  border:1px solid rgba(248,113,113,0.25); }
        .tag-purple{ background:rgba(167,139,250,0.12); color:#a78bfa;  border:1px solid rgba(167,139,250,0.25); }

        /* ── Score bar ── */
        .score-bar-track {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            transition: width 0.6s ease;
        }

        .score-bar-fill.green {
            background: linear-gradient(90deg, #059669, #34d399);
        }

        .score-bar-fill.amber {
            background: linear-gradient(90deg, #d97706, #fbbf24);
        }

        /* ── Forms ── */
        .form-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: rgba(255,255,255,0.6);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 10px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.88);
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(167,139,250,0.6);
            background: rgba(255,255,255,0.08);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }

        select option { background: #1a1530; color: #fff; }

        textarea { min-height: 140px; resize: vertical; }

        /* ── Section label ── */
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(167,139,250,0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.6rem;
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid rgba(167,139,250,0.1);
            margin: 1rem 0;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: rgba(255,255,255,0.3);
        }

        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.5);
        }

        /* ── Back link ── */
        .back-link {
            display: inline-block;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: #a78bfa; }

        /* ── Glow accent on cards ── */
        .card-purple {
            border-color: rgba(167,139,250,0.3);
            box-shadow: 0 0 20px rgba(167,139,250,0.05);
        }

        .card-green {
            border-color: rgba(52,211,153,0.25);
            box-shadow: 0 0 20px rgba(52,211,153,0.05);
        }

        .card-amber {
            border-color: rgba(251,191,36,0.25);
            box-shadow: 0 0 20px rgba(251,191,36,0.05);
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="brand">✦ Job<span>Scribe</span></a>
    <div>
        <a href="/">Dashboard</a>
        <a href="/add-job">+ Add Job</a>
        <a href="/analytics">Analytics</a>
        <a href="/docs">API Docs</a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
