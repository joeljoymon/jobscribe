<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobScribe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        nav {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
        }

        nav .brand span { color: #4cc9f0; }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav a:hover { color: #4cc9f0; }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-applied   { background: #dbeafe; color: #1e40af; }
        .badge-interview { background: #fef3c7; color: #92400e; }
        .badge-offer     { background: #d1fae5; color: #065f46; }
        .badge-rejected  { background: #fee2e2; color: #991b1b; }
        .badge-ghosted   { background: #f3f4f6; color: #6b7280; }

        /* Cards */
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary  { background: #1a1a2e; color: #fff; }
        .btn-blue     { background: #4cc9f0; color: #1a1a2e; }
        .btn-danger   { background: #fee2e2; color: #991b1b; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        th {
            background: #1a1a2e;
            color: #fff;
            padding: 0.9rem 1rem;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9fafb; }

        /* Forms */
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: #444;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4cc9f0;
        }
        textarea { min-height: 150px; resize: vertical; }

        /* Score bar */
        .score-bar-track {
            background: #f0f0f0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #4cc9f0, #1a1a2e);
            transition: width 0.6s ease;
        }

        /* Skills tags */
        .tag {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 0.2rem;
        }
        .tag-green  { background: #d1fae5; color: #065f46; }
        .tag-red    { background: #fee2e2; color: #991b1b; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">Job<span>Scribe</span></a>
        <div>
            <a href="/">Dashboard</a>
            <a href="/add-job">+ Add Job</a>
            <a href="/analytics">Analytics</a>
            <a href="/docs">API Docs</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
